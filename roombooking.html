<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="container">
        <div class="class">
            <div class="row">
                <div class="col col-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12">
                    <div class="row">
                        <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6"><label for=""
                                class="form-label">Full Name</label>
                            <input type="text" class="form-control">
                        </div>
                        <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6"><label for=""
                                class="form-label">Email address</label>
                            <input type="email" class="form-control">
                        </div>
                        <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6"><label for=""
                                class="form-label">Password</label>
                            <input type="password" class="form-control">
                        </div>
                        <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6"><label for=""
                                class="form-label">Confirm Password</label>
                            <input type="password" name="" id="" class="form-control">
                        </div>
                        <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6"><label for=""
                                class="form-label">Phone number</label>
                            <input type="number" name="" id="" class="form-control">
                        </div>
                        <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6"><label for=""
                                class="form-label">Gender</label>
                            <input type="radio" name="Gender" id="" class="form-check-input">Male
                            <input type="radio" name="Gender" id="" class="form-check-input">Female
                        </div>
                        <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6"><label for=""
                                class="form-label">Room Type</label>
                           <select name="" id="" class="form-select">
                            <option value="" class="">Single</option>
                            <option value="" class="">Double</option>
                            <option value="" class="">Delux</option>
                            <option value="" class="">Suite</option>
                           </select>
                        </div>
                        <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6"><label for=""
                                class="form-label">Meal Plan</label>
                           
                            <select name="" id="" class="form-select">
                            <option value="" class="">Room only</option>
                            <option value="" class="">Breakfast Included</option>
                            <option value="" class="">Half Board</option>
                            <option value="" class="">Full Boared</option>
                           </select>
                        </div>
                        <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6"><label for=""
                                class="form-label">Country</label>
                            <select name="" id="" class="form-select">
                            <option value="" class="">India</option>
                            <option value="" class="">China</option>
                            <option value="" class="">Japan</option>
                            <option value="" class="">America</option>
                           </select>
                        </div>
                        <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6"><label for=""
                                class="form-label">Check-in Date</label>
                            <input type="date" class="form-control">
                        </div>
                        <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6"><label for=""
                                class="form-label">Check out Date</label>
                            <input type="date" class="form-control">
                        </div>
                        <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6"><label for=""
                                class="form-label">Number of Gusts</label>
                            <input type= "number"> </input>
                        </div>
                        <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6"><label for=""
                                class="form-label">Number of Rooms</label>
                            <input type= "number"> </input>
                        </div>
                        <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6"><label for=""
                                class="form-label">Payment Method</label>
                            <select name="" id="" class="form-select">
                            <option value="" class="">Credit Card</option>
                            <option value="" class="">Debit Card</option>
                            <option value="" class="">UPI</option>
                            <option value="" class="">Cash on Arrival</option>
                           </select>
                        </div>
                        <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6"><label for=""
                                class="form-label">Room Image Url</label>
                            <input type= "url"> </input>
                        </div>
                        <div class="col col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6"><label for=""
                                class="form-label">Special Request</label>
                            <textarea rows="3" cols="15"> </textarea>
                        </div>
                        <div class="col col-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12"><a href="viewbooking"></a><button
                                class="btn btn-primary" type="button">Submit</button></a></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
